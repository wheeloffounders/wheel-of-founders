# Sync Preview environment variables on PRs and main
# Ensures Preview deployments have required env vars
# Requires: VERCEL_TOKEN in repo secrets (from vercel.com/account/tokens)
name: Sync Preview Environment Variables

on:
  pull_request:
    types: [opened, synchronize]
  push:
    branches: [main]

jobs:
  sync-preview-env:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Pull Production env to .env.local
        run: vercel env pull .env.local --environment=production --yes
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Sync to Preview environment
        run: ./scripts/fix-preview-supabase-env.sh
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
